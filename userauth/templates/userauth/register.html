<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  </head>
    
  <style>
    *{
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body{
      padding: 20px;
    }
    .cc{
      box-shadow: 1px 0px 5px 0px rgb(139, 137, 137);
    }
  </style>

  <body>
  <div class="col-md-5 p-4 mx-auto cc">

    <form method="post">
      <h1>Register</h1>
      {% csrf_token %}
      {% if messages %}

       {% for message in messages %}
        <div class="alert alert-warning alert-dismissible fade show" role="alert">
  <strong>{{message}} </strong> 
  <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
</div>
       {% endfor %}
      {% endif %}
  <div class="mb-3">
    <label for="exampleInputEmail1" class="form-label">First Name</label>
    <input type="text" class="form-control" id="exampleInputEmail1" placeholder="Enter Your First Name" name="first_name">
    <div id="emailHelp" class="form-text"></div>
  </div>


   <div class="mb-3">
    <label for="exampleInputEmail1" class="form-label">Username</label>
    <input type="text" class="form-control" id="exampleInputEmail1" placeholder="Enter Your Username" name="username">
    <div id="emailHelp" class="form-text"></div>
  </div>



  <div class="mb-3">
    <label for="exampleInputEmail1" class="form-label">Last Name</label>
    <input type="text" class="form-control" id="exampleInputEmail1" placeholder="Enter Your Last Name" name="last_name">
    <div id="emailHelp" class="form-text"></div>
  </div>
   


  <div class="mb-3">
    <label for="exampleInputEmail1" class="form-label">Email address</label>
    <input type="email" class="form-control" id="exampleInputEmail1" placeholder="Enter Your Email" name="email">
    <div id="emailHelp" class="form-text">We'll never share your email with anyone else.</div>
  </div>

  <div class="mb-3">
    <label for="exampleInputPassword1" class="form-label">Password</label>
    <input type="password" class="form-control" id="exampleInputPassword1" placeholder="Enter Your Password" name="password">
  </div>

  <div class="mb-3">
    <label for="exampleInputPassword1" class="form-label"> Comfrim Password</label>
    <input type="password" class="form-control" id="exampleInputPassword1" placeholder="Comfrim Your Password" name="password1">
  </div>

   <p><i> Already Have An  Account? <a href= {% url "login" %}>log in</a> </i> </p>

  <button type="submit" class="btn btn-primary">Sign UP</button>
</form>
  </div>








    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  </body>
</html>
